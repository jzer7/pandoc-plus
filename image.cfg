# Project Configuration - Single Source of Truth
# This file contains ALL configuration values for the project.
# If a value is not set here, the build will fail.

# Image configuration
IMAGE_NAME=jzer7/pandoc-plus
IMAGE_TAG=latest
REGISTRY=ghcr.io
BASE_IMAGE=pandoc/latex:3.9-ubuntu

# Build configuration
PLATFORMS=linux/amd64,linux/arm64
# comment out to disable Docker BuildKit
DOCKER_BUILDKIT=1

# Package configuration
SYSTEM_PACKAGES=make unzip wget
LATEX_PACKAGES=enumitem lastpage moderncv sectsty underscore

