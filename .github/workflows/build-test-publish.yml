name: Build, Test, and Publish

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: Build and test container image
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Load configuration from image.cfg
        id: config
        run: |
          # Read config without executing it as bash commands
          # We use grep/cut instead of 'source image.cfg' because unquoted space-separated
          # values (like LATEX_PACKAGES=enumitem moderncv sectsty) would be interpreted
          # as commands to execute, causing errors like "bash: moderncv: command not found"
          IMAGE_NAME=$(grep '^IMAGE_NAME=' image.cfg | cut -d'=' -f2)
          REGISTRY=$(grep '^REGISTRY=' image.cfg | cut -d'=' -f2)
          BASE_IMAGE=$(grep '^BASE_IMAGE=' image.cfg | cut -d'=' -f2)
          LATEX_PACKAGES=$(grep '^LATEX_PACKAGES=' image.cfg | cut -d'=' -f2)
          SYSTEM_PACKAGES=$(grep '^SYSTEM_PACKAGES=' image.cfg | cut -d'=' -f2)

          echo "image-name=$IMAGE_NAME" >> $GITHUB_OUTPUT
          echo "registry=$REGISTRY" >> $GITHUB_OUTPUT
          echo "base-image=$BASE_IMAGE" >> $GITHUB_OUTPUT
          echo "latex-packages=$LATEX_PACKAGES" >> $GITHUB_OUTPUT
          echo "system-packages=$SYSTEM_PACKAGES" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image (amd64 only)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          build-args: |
            BASE_IMAGE=${{ steps.config.outputs.base-image }}
            LATEX_PACKAGES=${{ steps.config.outputs.latex-packages }}
            SYSTEM_PACKAGES=${{ steps.config.outputs.system-packages }}
          tags: test-image:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test container image
        run: |
          # Override IMAGE_NAME and IMAGE_TAG for testing by passing them directly to make
          # This bypasses the image.cfg loading in the Makefile
          make test-all IMAGE_NAME=test-image IMAGE_TAG=latest

  publish:
    name: Publish container image
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Load configuration from image.cfg
        id: config
        run: |
          # Read config without executing it as bash commands
          # We use grep/cut instead of 'source image.cfg' because unquoted space-separated
          # values (like LATEX_PACKAGES=enumitem moderncv sectsty) would be interpreted
          # as commands to execute, causing errors like "bash: moderncv: command not found"
          IMAGE_NAME=$(grep '^IMAGE_NAME=' image.cfg | cut -d'=' -f2)
          REGISTRY=$(grep '^REGISTRY=' image.cfg | cut -d'=' -f2)
          BASE_IMAGE=$(grep '^BASE_IMAGE=' image.cfg | cut -d'=' -f2)
          PLATFORMS=$(grep '^PLATFORMS=' image.cfg | cut -d'=' -f2)
          LATEX_PACKAGES=$(grep '^LATEX_PACKAGES=' image.cfg | cut -d'=' -f2)
          SYSTEM_PACKAGES=$(grep '^SYSTEM_PACKAGES=' image.cfg | cut -d'=' -f2)

          echo "image-name=$IMAGE_NAME" >> $GITHUB_OUTPUT
          echo "registry=$REGISTRY" >> $GITHUB_OUTPUT
          echo "base-image=$BASE_IMAGE" >> $GITHUB_OUTPUT
          echo "platforms=$PLATFORMS" >> $GITHUB_OUTPUT
          echo "latex-packages=$LATEX_PACKAGES" >> $GITHUB_OUTPUT
          echo "system-packages=$SYSTEM_PACKAGES" >> $GITHUB_OUTPUT

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.config.outputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-platform image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ steps.config.outputs.platforms }}
          build-args: |
            BASE_IMAGE=${{ steps.config.outputs.base-image }}
            LATEX_PACKAGES=${{ steps.config.outputs.latex-packages }}
            SYSTEM_PACKAGES=${{ steps.config.outputs.system-packages }}
          tags: |
            ${{ steps.config.outputs.registry }}/${{ steps.config.outputs.image-name }}:${{ steps.version.outputs.version }}
            ${{ steps.config.outputs.registry }}/${{ steps.config.outputs.image-name }}:latest
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
