name: Build and Test Docker Image

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build and test Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Check out the repo
        uses: actions/checkout@v6

      - name: Load configuration
        id: config
        run: |
          if [ -f image.cfg ]; then
            echo "Loading configuration from image.cfg"
            source image.cfg
          fi
          echo "image-name=$IMAGE_NAME"           >> $GITHUB_OUTPUT
          echo "registry=$REGISTRY"               >> $GITHUB_OUTPUT
          echo "base-image=$BASE_IMAGE"           >> $GITHUB_OUTPUT
          echo "platforms=$PLATFORMS"             >> $GITHUB_OUTPUT
          echo "build-args=$BUILD_ARGS"           >> $GITHUB_OUTPUT
          echo "latex-packages=$LATEX_PACKAGES"   >> $GITHUB_OUTPUT
          echo "system-packages=$SYSTEM_PACKAGES" >> $GITHUB_OUTPUT
        env:
          IMAGE_NAME:      jzer7/pandoc-plus
          REGISTRY:        ghcr.io
          BASE_IMAGE:      pandoc/latex:3.7-ubuntu
          PLATFORMS:       linux/amd64,linux/arm64
          BUILD_ARGS:      BUILDKIT_INLINE_CACHE=1
          LATEX_PACKAGES:  ""
          SYSTEM_PACKAGES: "make"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker buildx build \
            --tag ${{ steps.config.outputs.image-name }}:${{ github.ref_name }} \
            --tag ${{ steps.config.outputs.image-name }}:${{ github.sha }} \
            --load \
            .

      - name: Test Docker image functionality
        run: make test-container
        env:
          IMAGE_NAME: ${{ steps.config.outputs.image-name }}
          IMAGE_TAG: ${{ github.ref_name }}

      - name: Test document conversion
        run: make test-conversion
        env:
          IMAGE_NAME: ${{ steps.config.outputs.image-name }}
          IMAGE_TAG: ${{ github.ref_name }}

      - name: Clean up test artifacts
        run: make test-cleanup
        if: always()
